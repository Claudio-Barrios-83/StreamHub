name: rotar-tokens

on:
  schedule:
    - cron: "30 */6 * * *"
  workflow_dispatch:

jobs:
  rotar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Instalar dependencias
        run: pip install requests beautifulsoup4

      - name: Rotar tokens externos
        run: python3 plutourlxurl.py

      - name: Commit cambios
        run: |
          git config --global user.name "streamhub-bot"
          git config --global user.email "bot@users.noreply.github.com"
          git add *.m3u canales-script/*.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "🤖 Rotación de tokens"
          git push
