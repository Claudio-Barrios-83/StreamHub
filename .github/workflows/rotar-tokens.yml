name: rotar-tokens

# Deshabilitado: el script plutourlxurl.py dependía de listas M3U
# personales (pluto_ar.m3u, principal.m3u, etc.) que ya no existen.
# La actualización de Pluto la hace el workflow actualizar-pluto.
# Mantener el archivo evita confusión si alguien busca el nombre,
# pero el job sale OK sin hacer cambios.

on:
  schedule:
    - cron: "30 */6 * * *"
  workflow_dispatch:

jobs:
  rotar:
    runs-on: ubuntu-latest
    steps:
      - name: Workflow obsoleto
        run: |
          echo "rotar-tokens está deshabilitado."
          echo "Motivo: faltan pluto_ar.m3u / principal.m3u / Alicia.m3u / etc."
          echo "Usá actualizar-pluto para refrescar canales de Pluto TV."
          exit 0
